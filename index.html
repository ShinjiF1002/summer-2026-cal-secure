document.getElementById('f').addEventListener('submit',async function(ev){

  var d=b64(PAYLOAD),salt=d.slice(0,16),iv=d.slice(16,28),tag=d.slice(28,44),ct=d.slice(44);
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(document.getElementById('p').value),'PBKDF2',false,['deriveKey']);
  var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);

  var htmlStr=new TextDecoder().decode(plain);
